repos:
  - repo: local
    hooks:
      - id: go-generate
        name: go generate
        entry: go generate ./...
        language: system
        files: '\.(go|templ|sql)$'
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(md|templ)$'
      - id: end-of-file-fixer
        exclude: '\.templ$'
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  - repo: local
    hooks:
      - id: templ-fmt
        name: templ fmt
        entry: templ fmt .
        language: system
        files: '\.templ$'
        pass_filenames: false

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports
        exclude: '_templ\.go$'

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.10.1
    hooks:
      - id: golangci-lint
        args: ['--timeout=5m']
